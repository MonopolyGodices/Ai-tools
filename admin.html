<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="robots" content="noindex, nofollow">
    <title>Admin Console — NEXUS GEN</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="dashboard.css">
    <style>
        /* Admin Gate Style */
        .admin-gate {
            position: fixed; inset: 0; background: var(--bg); z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px;
        }
        .gate-box {
            background: var(--surface); border: 1px solid var(--border); padding: 40px; border-radius: 20px; text-align: center; max-width: 400px; width: 90%;
        }
        .gate-box h2 { font-family: var(--display); font-style: italic; font-size: 32px; margin-bottom: 10px; color: var(--accent); }
        .gate-box p { color: var(--text-dim); font-size: 14px; margin-bottom: 20px; }
        .gate-input {
            width: 100%; background: var(--bg-2); border: 1px solid var(--border); padding: 14px; border-radius: 10px; color: var(--text); text-align: center; font-family: var(--mono); letter-spacing: 2px; outline: none;
        }
        .gate-input:focus { border-color: var(--accent); }
        .gate-btn {
            width: 100%; margin-top: 16px; background: var(--accent); color: #fff; border: none; padding: 14px; border-radius: 10px; font-weight: 600; cursor: pointer;
        }

        /* Admin Panel Styles */
        .admin-banner {
            background: rgba(255, 61, 0, 0.1); border: 1px solid var(--accent); padding: 12px 20px; border-radius: 12px; margin-bottom: 24px;
            display: flex; justify-content: space-between; align-items: center; color: var(--accent);
        }
        .admin-controls {
            display: flex; gap: 12px; flex-wrap: wrap;
        }
        .btn-admin {
            background: var(--surface-2); border: 1px solid var(--border); color: var(--text); padding: 10px 16px; border-radius: 8px; cursor: pointer; font-weight: 500; display: flex; align-items: center; gap: 8px;
        }
        .btn-admin:hover { border-color: var(--accent); }
        .btn-generate.free { background: var(--green); color: #000; }
    </style>
</head>
<body>

    <!-- Admin Gate (Login) -->
    <div class="admin-gate" id="adminGate">
        <div class="gate-box">
            <h2>Admin Access</h2>
            <p>Enter passcode to access the control panel.</p>
            <input type="password" class="gate-input" id="adminPassInput" placeholder="••••••••">
            <button class="gate-btn" onclick="checkAdminPass()">Unlock Console</button>
        </div>
    </div>

    <!-- Admin Dashboard (Hidden until unlocked) -->
    <div id="adminPanel" style="display: none;">
        <!-- Top Navigation -->
        <nav class="dash-nav">
            <div class="nav-left">
                <a href="index" class="logo-back">
                    <div class="logo-mark">N</div>
                    <span>NEXUS GEN</span>
                </a>
            </div>
            <div class="nav-right">
                <div class="credits-badge" style="color: var(--accent-3);">
                    <i class="fa-solid fa-shield-halved"></i> Admin Mode
                </div>
                <div class="user-info">
                    <a href="dashboard" class="btn-signin" style="border: 1px solid var(--border); padding: 8px 18px; border-radius: 999px; color: var(--text-dim);">Exit to User Panel</a>
                </div>
            </div>
        </nav>

        <div class="dash-container">
            <!-- Main Content -->
            <main class="main-content" style="margin-left: 0;">
                
                <div class="admin-banner">
                    <div>
                        <i class="fa-solid fa-bolt"></i> <strong>Unlimited Generation Active</strong> <br>
                        <span style="font-size: 12px; color: var(--text-dim);">Credits will not be deducted in this mode.</span>
                    </div>
                    <div class="admin-controls">
                        <button class="btn-admin" onclick="addUserCredits(100)"><i class="fa-solid fa-plus"></i> Add 100 Credits</button>
                        <button class="btn-admin" onclick="addUserCredits(500)"><i class="fa-solid fa-plus"></i> Add 500 Credits</button>
                    </div>
                </div>

                <div class="playground-grid" style="grid-template-columns: 400px 1fr;">
                    <!-- Left Controls -->
                    <div class="control-panel">
                        <div class="input-group">
                            <label>Active Model</label>
                            <select class="dash-input" id="adminModelSelect">
                                <optgroup label="Video Models">
                                    <option>Seedance 2 — ByteDance</option>
                                    <option>Sora 2 — OpenAI</option>
                                    <option>Veo 3 — Google DeepMind</option>
                                    <option>Gemini Omni — Google</option>
                                </optgroup>
                                <optgroup label="Image Models">
                                    <option>Nano Banana Pro — Google</option>
                                    <option>Midjourney v7 — Midjourney</option>
                                    <option>Flux 2 Pro — Black Forest Labs</option>
                                </optgroup>
                            </select>
                        </div>

                        <div class="input-group">
                            <label>Prompt</label>
                            <textarea class="dash-input" rows="4" placeholder="Promo video prompt..."></textarea>
                        </div>

                        <div class="input-group">
                            <label>Aspect Ratio</label>
                            <div class="pills">
                                <button class="pill active">16:9</button>
                                <button class="pill">9:16</button>
                                <button class="pill">1:1</button>
                            </div>
                        </div>

                        <button class="btn-generate free" onclick="generateAdmin()">
                            <i class="fa-solid fa-bolt"></i> Generate (Free)
                        </button>
                    </div>

                    <!-- Right Preview -->
                    <div class="preview-panel">
                        <div class="preview-header">
                            <span class="status-text" id="adminStatus">Idle · Ready for promo creation</span>
                        </div>
                        <div class="preview-screen" id="adminPreviewScreen">
                            <div class="empty-state">
                                <i class="fa-solid fa-image"></i>
                                <h4>Promo Canvas</h4>
                                <p>Create marketing materials for free</p>
                            </div>
                            <img id="adminPreviewImg" src="" alt="Preview" style="display: none; width: 100%; height: 100%; object-fit: cover;">
                            <div class="loading-overlay" id="adminLoading">
                                <div class="loader"></div>
                                <p>Generating promo asset...</p>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
