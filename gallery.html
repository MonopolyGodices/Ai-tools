<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="robots" content="noindex, nofollow">

    <title>Gallery — NEXUS GEN</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="dashboard.css">
    <style>
        /* Specific Gallery Styles */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        .gallery-card {
            background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
            overflow: hidden; transition: 0.3s; position: relative;
        }
        .gallery-card:hover { transform: translateY(-4px); border-color: var(--border-strong); }
        .gallery-img-wrapper { width: 100%; aspect-ratio: 16/9; background: var(--bg-2); position: relative; }
        .gallery-img-wrapper img { width: 100%; height: 100%; object-fit: cover; }
        .gallery-info { padding: 14px 16px; }
        .gallery-model { font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 4px; }
        .gallery-date { font-family: var(--mono); font-size: 11px; color: var(--text-faint); }
        .gallery-type-badge {
            position: absolute; top: 10px; left: 10px; padding: 4px 8px; border-radius: 6px;
            font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); color: var(--text);
            display: flex; align-items: center; gap: 5px;
        }
        .gallery-actions {
            position: absolute; bottom: 10px; right: 10px; display: flex; gap: 8px;
            opacity: 0; transition: 0.2s;
        }
        .gallery-card:hover .gallery-actions { opacity: 1; }
        .action-btn {
            width: 32px; height: 32px; border-radius: 8px; background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px); border: 1px solid var(--border); color: var(--text);
            display: flex; align-items: center; justify-content: center; font-size: 12px; cursor: pointer;
        }
        .action-btn:hover { background: var(--accent); border-color: var(--accent); }
        .action-btn.delete:hover { background: var(--accent-3); border-color: var(--accent-3); }

        .empty-gallery {
            grid-column: 1 / -1; display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 80px 20px; border: 2px dashed var(--border); border-radius: 20px; color: var(--text-faint);
        }
        .empty-gallery i { font-size: 48px; margin-bottom: 20px; }
        .empty-gallery h3 { font-family: 'Instrument Serif', serif; font-style: italic; font-size: 28px; color: var(--text-dim); margin-bottom: 8px; }
        .empty-gallery p { font-size: 14px; margin-bottom: 24px; }
    </style>
</head>
<body>

    <!-- Top Navigation -->
    <nav class="dash-nav">
        <div class="nav-left">
            <button id="menuToggle" class="menu-btn"><i class="fa-solid fa-bars"></i></button>
            <a href="/" class="logo-back">
                <div class="logo-mark">N</div>
                <span>NEXUS GEN</span>
            </a>
        </div>
        
        <div class="nav-right">
            <div class="credits-badge">
                <i class="fa-solid fa-bolt"></i>
                <span id="userCredits">0</span>
            </div>
            <button id="addCreditsBtn" class="add-credits-btn" title="Earn Credits"><i class="fa-solid fa-plus"></i></button>
            <div class="user-info">
                <span id="userName">User</span>
                <div class="avatar">U</div>
                <button id="logoutBtn" class="logout-btn" title="Logout"><i class="fa-solid fa-right-from-bracket"></i></button>
            </div>
        </div>
    </nav>

    <div class="dash-container">
        <!-- Sidebar (Fixed Links) -->
        <aside class="sidebar" id="sidebar">
            <ul class="side-menu">
                <li onclick="window.location.href='dashboard'"><i class="fa-solid fa-wand-magic-sparkles"></i> Generate</li>
                <li class="active" onclick="window.location.href='gallery'"><i class="fa-solid fa-images"></i> Gallery</li>
                <li onclick="window.location.href='tasks'"><i class="fa-solid fa-gift"></i> Earn Credits</li>
                <li onclick="window.location.href='settings'"><i class="fa-solid fa-gear"></i> Settings</li>
            </ul>
            <div class="upgrade-card">
                <h4>Need more power?</h4>
                <p>Complete tasks or upgrade to Studio Pro for 4K renders.</p>
                <button class="btn-upgrade" onclick="window.location.href='tasks'">Get Credits</button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div style="margin-bottom: 24px;">
                <h1 style="font-family: 'Instrument Serif', serif; font-style: italic; font-size: 2.5rem;">Your Creations</h1>
                <p style="color: var(--text-dim); font-size: 14px;">All your generated videos and images in one place.</p>
            </div>

            <div class="gallery-grid" id="galleryGrid">
                <!-- Images will be injected here by JS -->
            </div>
        </main>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast">
        <i class="fa-solid fa-circle-info"></i>
        <span id="toastMsg">Message</span>
    </div>

    <script src="gallery.js"></script>
</body>
</html>
